name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test and Build
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          PYTHONPATH=. pytest

      - name: Build package
        run: |
          pip install build
          python -m build

  slscan:
    name: ShiftLeft Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Perform slscan
        uses: ShiftLeftSecurity/scan-action@v1.3.0
        with:
          type: "credscan,python,depscan"
        env:
          WORKSPACE: https://github.com/${{ github.repository }}/blob/${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload slscan reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slscan-reports
          path: reports

  docker-build:
    name: Package (Docker Build)
    runs-on: ubuntu-latest
    needs: slscan
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t myapp:${{ github.sha }} .

      - name: Save image for next jobs
        run: docker save myapp:${{ github.sha }} -o myapp.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: myapp.tar

  helm-lint:
    name: Helm Lint & Validate
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./helm/myapp

      - name: Helm template validate
        run: |
          helm template myapp ./helm/myapp \
            --set image.tag=${{ github.sha }} \
            > rendered-manifest.yaml
          echo "Rendered manifest:"
          cat rendered-manifest.yaml

      - name: Upload rendered manifest
        uses: actions/upload-artifact@v7
        with:
          name: helm-manifest
          path: rendered-manifest.yaml

  image-hardening:
    name: Image Hardening (Dockle)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i myapp.tar

      - name: Dockle (Image linting)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:v0.4.15 \
            --exit-code 1 \
            --exit-level warn \
            myapp:${{ github.sha }}

  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i myapp.tar

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          limit-severities-for-sarif: true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-results.sarif

  k8s-hardening:
    name: K8s Hardening (KubeSec)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Render Helm template
        run: |
          helm template myapp ./helm/myapp \
            --set image.tag=${{ github.sha }} \
            -s templates/deployment.yaml \
            > rendered-for-kubesec.yaml

      - name: KubeSec scan
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            kubesec/kubesec:v2 \
            scan /workspace/rendered-for-kubesec.yaml

  deploy:
  name: Deploy, E2E Tests, DAST
  runs-on: ubuntu-latest
  needs: [image-hardening, image-scan, k8s-hardening, helm-lint]

  steps:
    - name: Checkout source
      uses: actions/checkout@v6

    # =========================
    # 1. Load Docker Image
    # =========================
    - name: Download image artifact
      uses: actions/download-artifact@v7
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load -i myapp.tar

    # =========================
    # 2. Start Kubernetes (kind)
    # =========================
    - name: Start kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: kind

    - name: Debug cluster
      run: |
        kind get clusters
        kubectl cluster-info
        kubectl get nodes

    - name: Wait for cluster ready
      run: |
        kubectl wait --for=condition=Ready nodes --all --timeout=120s

    # =========================
    # 3. Load image into cluster
    # =========================
    - name: Load image into kind
      run: kind load docker-image myapp:${{ github.sha }} --name kind

    # =========================
    # 4. Deploy with Helm
    # =========================
    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Deploy with Helm
      run: |
        helm install myapp ./helm/myapp \
          --set image.tag=${{ github.sha }} \
          --set image.repository=myapp \
          --set image.pullPolicy=Never \
          --wait --timeout 120s

    - name: Verify deployment
      run: |
        kubectl get pods
        kubectl get svc
        kubectl rollout status deployment/myapp

    # =========================
    # 5. Port-forward (for tests)
    # =========================
    - name: Port-forward service
      run: |
        kubectl port-forward svc/myapp 8000:8000 &
        sleep 5
        curl -f http://localhost:8000/health

    # =========================
    # 6. E2E Tests
    # =========================
    - name: E2E tests
      run: |
        curl -f http://localhost:8000/health

        curl -f -X POST http://localhost:8000/hello \
          -H "Content-Type: application/json" \
          -d '{"name": "World"}'

        echo "E2E tests passed!"

    # =========================
    # 7. DAST (OWASP ZAP)
    # =========================
    - name: Create zap output folder
      run: mkdir -p zap-output

    - name: OWASP ZAP Baseline Scan
      run: |
        docker run --rm \
          -v $(pwd)/zap-output:/zap/wrk/:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t http://host.docker.internal:8000 \
          -r zap-report.html \
          -I || true

    - name: Upload ZAP report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: zap-report
        path: zap-output/zap-report.html

    # =========================
    # 8. Cleanup
    # =========================
    - name: Stop port-forward
      if: always()
      run: |
        pkill kubectl || true