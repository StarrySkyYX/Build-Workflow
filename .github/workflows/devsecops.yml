name: Python CI

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  workflow_dispatch:

jobs:
  scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test and Build
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          PYTHONPATH=. pytest

      - name: Build package
        run: |
          pip install build
          python -m build

  slscan:
    name: ShiftLeft Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Perform slscan
        uses: ShiftLeftSecurity/scan-action@v1.3.0
        with:
          type: "credscan,python,depscan"
        env:
          WORKSPACE: https://github.com/${{ github.repository }}/blob/${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload slscan reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slscan-reports
          path: reports

  helm-lint:
    name: Helm Lint & Validate
    runs-on: ubuntu-latest
    needs: slscan
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ./helm/myapp

      - name: Helm template validate
        run: |
          helm template myapp ./helm/myapp \
            --set image.tag=${{ github.sha }} \
            > rendered-manifest.yaml
          echo "Rendered manifest:"
          cat rendered-manifest.yaml

      - name: Upload rendered manifest
        uses: actions/upload-artifact@v7
        with:
          name: helm-manifest
          path: rendered-manifest.yaml

  docker-build:
    name: Package (Docker Build)
    runs-on: ubuntu-latest
    needs: helm-lint
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Build Docker image
        run: |
          docker build -t myapp:${{ github.sha }} .
          docker tag myapp:${{ github.sha }} myapp:${{ github.sha }}

      - name: Save image for next jobs
        run: docker save myapp:${{ github.sha }} -o myapp.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: myapp.tar

  image-hardening:
    name: Image Hardening (Dockle)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i myapp.tar

      - name: Dockle (Image linting)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            goodwithtech/dockle:v0.4.15 \
            --exit-code 1 \
            --exit-level warn \
            myapp:${{ github.sha }}

  image-scan:
    name: Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i myapp.tar

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          limit-severities-for-sarif: true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-results.sarif

  k8s-hardening:
    name: K8s Hardening (KubeSec)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Render Helm template
        run: |
          helm template myapp ./helm/myapp \
            --set image.tag=${{ github.sha }} \
            > rendered-for-kubesec.yaml

      - name: KubeSec scan
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            kubesec/kubesec:v2 \
            scan /workspace/rendered-for-kubesec.yaml

  deploy:
    name: Deploy to Dev (Helm + kubectl dry-run)
    runs-on: ubuntu-latest
    needs: [image-hardening, image-scan, k8s-hardening]
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Helm template + kubectl dry-run
        run: |
          helm template myapp ./helm/myapp \
            --set image.tag=${{ github.sha }} \
            | kubectl apply --dry-run=client -f -


  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image

      - name: Load and start app
        run: |
          docker load -i myapp.tar
          docker network create zapnet
          docker run -d \
            --network zapnet \
            --name myapp \
            -p 8000:8000 \
            myapp:${{ github.sha }}
          sleep 20
          curl -f http://localhost:8000/health || exit 1

      - name: OWASP ZAP Baseline Scan
        run: |
          mkdir -p zap-output
          chmod 777 zap-output
          docker run --rm \
            --network zapnet \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://myapp:8000 \
            -r zap-report.html \
            -I || true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: zap-output/zap-report.html

      - name: Stop app container
        if: always()
        run: |
          docker stop myapp || true
          docker network rm zapnet || true

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v7
        with:
          name: docker-image

      - name: Load and start app
        run: |
          docker load -i myapp.tar
          docker run -d \
            --name myapp-e2e \
            -p 8000:8000 \
            myapp:${{ github.sha }}
          sleep 20
          curl -f http://localhost:8000/health || exit 1

      - name: E2E tests
        run: |
          echo "Running E2E tests..."
          curl -f http://localhost:8000/health
          curl -f -X POST http://localhost:8000/hello \
            -H "Content-Type: application/json" \
            -d '{"name": "World"}'
          echo "E2E tests passed!"

      - name: Stop app container
        if: always()
        run: docker stop myapp-e2e || true